name: nyomv2_eurusd_wf
symbol: EURUSD
timeframe: M5
data_path: data/canonical/EURUSD_M5_2014-01-01__2024-12-31__dukascopy_v2_clean.csv

instrument:
  pip_size: 0.0001
  data_source: dukascopy

dataset_registry:
  registry_dir: data/registry
  allow_override: false
  override_reason: ""

strategy:
  name: NYOpeningMomentumV2
  params:
    threshold_q: 0.80
    impulse_efficiency_min: 0.70
    entry_delay_min: 30
    holding_min: 30
    qty: 1.0
    warmup_bars: 250

execution:
  policy_id: baseline

costs:
  commission: 0.0
  spread_pips: 1.0
  slippage_pips: 0.0

risk:
  max_daily_loss_R: 999.0
  max_trades_per_day: 1
  cooldown_bars: 0

  max_concurrent_positions: 1
  time_window_enabled: false
  window_start_utc: "00:00"
  window_end_utc: "23:59"

  max_holding_bars: 6
  eof_buffer_bars: 6

  no_entry_on_last_bar: true
  force_exit_on_eof: true

  allow_missing_sl: true
  risk_proxy_price: 0.0010